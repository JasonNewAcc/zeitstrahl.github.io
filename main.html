<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zeitstrahl Generator Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --line-color: #4472C4; 
            --line-weight: 4px; 
            --year-size: 26px;
            --info-size: 16px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #cbd2d9; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Präsentationsmodus */
        body.pres-mode { background: #111; overflow: hidden; }
        body.pres-mode .main-controls, body.pres-mode #settings-menu, body.pres-mode #header-editor { display: none !important; }
        
        .focus-event { 
            outline: 4px solid gold !important; 
            transform: translateX(-50%) scale(1.3) !important; 
            z-index: 1000 !important; 
            background: white; border-radius: 10px; padding: 15px;
            box-shadow: 0 0 40px rgba(255,215,0,0.6);
        }

        .main-controls {
            background: white; padding: 12px 25px; border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex; gap: 12px; align-items: center;
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000;
        }

        .input-box { 
            padding: 10px 18px; border: 1px solid #ddd; 
            border-radius: 25px; outline: none; font-size: 14px;
        }

        .btn { 
            padding: 10px 20px; border: none; border-radius: 25px; 
            cursor: pointer; font-weight: bold; transition: all 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-add { background: #4472C4; color: white; }
        .btn-pres { background: #2c3e50; color: white; }

        #header-editor {
            display: none; position: absolute; background: #222; color: white;
            padding: 12px; border-radius: 10px; gap: 10px; z-index: 2000;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4); align-items: center;
        }
        #header-editor button { background: #444; border: none; color: white; padding: 6px 12px; cursor: pointer; border-radius: 5px; }

        #settings-menu {
            display: none; background: white; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px;
            gap: 20px; flex-wrap: wrap; justify-content: center;
        }
        .setting-group { display: flex; flex-direction: column; gap: 5px; }
        .setting-group label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }

        /* Zeichenbereich */
        #export-area {
            background: white; padding: 80px 0; position: relative;
            box-shadow: 0 0 60px rgba(0,0,0,0.15);
            width: 1100px; height: 700px; box-sizing: border-box; overflow: hidden;
        }

        #title-el { font-size: 3em; margin: 0 0 40px 0; outline: none; text-align: center; }
        
        .main-timeline-line { 
            position: absolute; top: 55%; left: 80px; right: 100px; 
            height: var(--line-weight); background: var(--line-color); 
            z-index: 1;
        }
        .main-timeline-line::after {
            content: ''; position: absolute; right: -25px; top: 50%; transform: translateY(-50%);
            border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--line-color);
        }

        #events-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }
        #events-container * { pointer-events: auto; }

        /* EVENT DESIGN - FEHLERHAFTER ZUSTAND (Verschiebt sich in PDF) */
        .event { 
            position: absolute; width: 220px; transform: translateX(-50%); 
            display: flex; align-items: center; z-index: 10;
        }
        .event.top { bottom: 45.5%; flex-direction: column; }
        .event.bottom { top: 55.5%; flex-direction: column-reverse; }

        .connector { width: 2px; height: 65px; background: var(--line-color); cursor: pointer; position: relative; }
        
        .milestone-badge {
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2.5px solid var(--line-color); border-radius: 50%;
            width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; z-index: 20;
        }
        .event.top .milestone-badge { bottom: -17px; }
        .event.bottom .milestone-badge { top: -17px; }

        .content-box { text-align: center; width: 100%; }
        .year { font-size: var(--year-size); font-weight: 800; margin: 0; outline: none; }
        .divider { width: 35px; height: 4px; background: var(--line-color); margin: 8px auto; }
        .description { font-size: var(--info-size); margin: 0; outline: none; line-height: 1.4; padding: 5px; }
        .limit-exceeded { background: #fff1f1; border: 1px solid red; border-radius: 5px; }

        #emoji-picker {
            display: none; position: absolute; background: white; border: 1px solid #ccc;
            padding: 10px; border-radius: 12px; z-index: 3000; grid-template-columns: repeat(5, 1fr); gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .emoji-btn { cursor: pointer; font-size: 22px; padding: 5px; text-align: center; }

        #footer-text { position: absolute; bottom: 25px; right: 45px; font-size: 12px; color: #bbb; }
    </style>
</head>
<body>

    <div class="main-controls">
        <input type="text" id="yearIn" class="input-box" placeholder="Jahr" style="width: 100px;">
        <input type="text" id="descIn" class="input-box" placeholder="Ereignis..." style="width: 250px;" onkeydown="if(event.key==='Enter') addEvent()">
        <button class="btn btn-add" onclick="addEvent()">Hinzufügen</button>
        <button class="btn" style="background:#f39c12; color:white" onclick="sortEvents()">Sortieren</button>
        <button class="btn btn-pres" onclick="togglePresentation()">P</button>
        <button class="btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-menu">
        <div class="setting-group"><label>Icons</label><input type="checkbox" id="allowIcons" checked onchange="render()"></div>
        <div class="setting-group"><label>Größe</label><div style="display:flex;gap:5px;"><input type="number" id="wSet" value="1100" style="width:60px;" oninput="applyAllSettings()"><input type="number" id="hSet" value="700" style="width:60px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Schrift</label><div style="display:flex;gap:5px;"><input type="number" id="yearSizeSet" value="26" style="width:45px;" oninput="applyAllSettings()"><input type="number" id="infoSizeSet" value="16" style="width:45px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Linie</label><div style="display:flex;gap:5px;"><input type="color" id="lineColorSet" value="#4472C4" oninput="applyAllSettings()"><input type="number" id="lineWeightSet" value="4" style="width:35px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Limit</label><input type="number" id="limitSet" value="150" style="width:50px;" oninput="applyAllSettings()"></div>
        <button class="btn" style="background:#28a745; color:white" onclick="downloadPDF()">Export PDF</button>
    </div>

    <div id="header-editor">
        <input type="number" id="headSizeIn" value="48" style="width:50px" oninput="formatTitle('fontSize', this.value + 'px')">
        <button onclick="formatTitle('underline')">U</button>
        <button onclick="formatTitle('justifyCenter')">Center</button>
    </div>

    <div id="emoji-picker">
        <span class="emoji-btn" onclick="setEmoji('')">❌</span>
        <span class="emoji-btn" onclick="setEmoji('👑')">👑</span><span class="emoji-btn" onclick="setEmoji('⚔️')">⚔️</span>
        <span class="emoji-btn" onclick="setEmoji('💡')">💡</span><span class="emoji-btn" onclick="setEmoji('📜')">📜</span>
        <span class="emoji-btn" onclick="setEmoji('🔥')">🔥</span>
    </div>

    <div id="export-area">
        <h1 id="title-el" contenteditable="true" onfocus="showTitleEditor(event)">Mein Zeitstrahl</h1>
        <div class="main-timeline-line"></div>
        <div id="events-container"></div>
        <div id="footer-text">erstellt mit jasonnewacc.github.io/zeitstrahl</div>
    </div>

<script>
    let eventsData = [];
    let activeEventIdx = -1;
    let presIdx = -1;

    function toggleSettings() {
        const s = document.getElementById('settings-menu');
        s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
    }

    function showTitleEditor(e) {
        const editor = document.getElementById('header-editor');
        const rect = e.target.getBoundingClientRect();
        editor.style.display = 'flex'; editor.style.left = rect.left + 'px'; editor.style.top = (rect.bottom + window.scrollY) + 'px';
    }

    function formatTitle(cmd, val = null) {
        if(cmd === 'fontSize') document.getElementById('title-el').style.fontSize = val;
        else document.execCommand(cmd, false, val);
    }

    function applyAllSettings() {
        const area = document.getElementById('export-area');
        area.style.width = document.getElementById('wSet').value + "px";
        area.style.height = document.getElementById('hSet').value + "px";
        document.documentElement.style.setProperty('--year-size', document.getElementById('yearSizeSet').value + "px");
        document.documentElement.style.setProperty('--info-size', document.getElementById('infoSizeSet').value + "px");
        document.documentElement.style.setProperty('--line-color', document.getElementById('lineColorSet').value);
        document.documentElement.style.setProperty('--line-weight', document.getElementById('lineWeightSet').value + "px");
        render();
    }

    function addEvent() {
        const y = document.getElementById('yearIn'), d = document.getElementById('descIn');
        if(!y.value || !d.value) return;
        eventsData.push({ year: y.value, desc: d.value, icon: '' });
        y.value=""; d.value=""; render();
    }

    function sortEvents() {
        eventsData.sort((a, b) => parseInt(a.year) - parseInt(b.year));
        render();
    }

    function render() {
        const container = document.getElementById('events-container');
        container.innerHTML = "";
        const width = parseInt(document.getElementById('wSet').value);
        
        // FEHLER: Striche kleben am Anfang und Ende direkt am Rand (Kein Puffer)
        eventsData.forEach((ev, i) => {
            const isTop = i % 2 === 0;
            const xPos = 80 + (i / (eventsData.length - 1 || 1)) * (width - 180);
            
            const div = document.createElement('div');
            div.className = `event ${isTop ? 'top' : 'bottom'}`;
            div.id = `ev-dom-${i}`; div.style.left = xPos + "px";
            
            div.innerHTML = `
                <div class="content-box">
                    <div class="year" contenteditable="true" onblur="eventsData[${i}].year=this.innerText">${ev.year}</div>
                    <div class="divider"></div>
                    <div class="description" contenteditable="true" onblur="eventsData[${i}].desc=this.innerText">${ev.desc}</div>
                </div>
                <div class="connector" onclick="openEmojiPicker(event, ${i})" oncontextmenu="event.preventDefault(); eventsData.splice(${i},1); render();">
                    ${(document.getElementById('allowIcons').checked && ev.icon) ? `<div class="milestone-badge">${ev.icon}</div>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openEmojiPicker(e, idx) {
        e.stopPropagation(); activeEventIdx = idx;
        const p = document.getElementById('emoji-picker');
        p.style.display = 'grid'; p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
    }

    function setEmoji(emoji) {
        if(activeEventIdx !== -1) { eventsData[activeEventIdx].icon = emoji; render(); }
        document.getElementById('emoji-picker').style.display = 'none';
    }

    function togglePresentation() { document.body.classList.toggle('pres-mode'); }

    function downloadPDF() {
        const area = document.getElementById('export-area');
        html2pdf().from(area).save();
    }

    document.addEventListener('mousedown', (e) => {
        if(!e.target.closest('#header-editor') && !e.target.closest('#title-el')) document.getElementById('header-editor').style.display = 'none';
        if(!e.target.closest('#emoji-picker')) document.getElementById('emoji-picker').style.display = 'none';
    });

    applyAllSettings();
</script>
</body>
</html>
