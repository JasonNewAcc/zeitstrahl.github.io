<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zeitstrahl Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --line-color: #4472C4; 
            --line-weight: 4px; 
            --event-gap: 40px;
            --year-size: 1.5em;
            --info-size: 0.9em;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #cbd2d9; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.3s;
        }

        /* Präsentations-Modus */
        body.pres-mode { background: #1a1a1a; overflow: hidden; }
        body.pres-mode .main-controls, body.pres-mode #settings-menu, body.pres-mode #header-editor { display: none !important; }
        .focus-event { 
            outline: 4px solid gold !important; 
            transform: translateX(-50%) scale(1.25) !important; 
            z-index: 1000 !important; 
            background: rgba(255,255,255,0.9);
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        .main-controls {
            background: white; padding: 15px 25px; border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex; gap: 15px; align-items: center;
            margin-bottom: 20px; position: sticky; top: 10px; z-index: 1000;
        }

        .input-box { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn { padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #4472C4; color: white; }
        .btn-pres { background: #2c3e50; color: white; }

        /* Header Editor Popup */
        #header-editor {
            display: none; position: absolute; background: #333; color: white;
            padding: 8px; border-radius: 8px; gap: 10px; z-index: 2000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); align-items: center;
        }
        #header-editor button, #header-editor input { 
            background: #444; border: 1px solid #666; color: white; 
            padding: 2px 8px; cursor: pointer; border-radius: 4px; 
        }

        #export-area {
            background: white; padding: 60px 80px; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            width: 1100px; min-height: 650px; box-sizing: border-box; overflow: hidden;
            transition: transform 0.5s ease;
        }

        #title-el { font-size: 2.5em; margin-bottom: 40px; outline: none; width: 100%; text-align: left; }
        
        .timeline-wrapper { 
            position: absolute; top: 55%; left: 80px; right: 100px; 
            height: var(--line-weight); background: var(--line-color); 
        }
        
        .timeline-wrapper::after {
            content: ''; position: absolute; right: -25px; top: 50%; transform: translateY(-50%);
            border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--line-color);
        }

        .event { position: absolute; width: 200px; transform: translateX(-50%); display: flex; align-items: center; z-index: 10; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .event.top { bottom: 0; flex-direction: column; padding-bottom: var(--event-gap); }
        .event.bottom { top: 0; flex-direction: column-reverse; padding-top: var(--event-gap); }

        .connector { width: 2px; height: 60px; background: var(--line-color); cursor: pointer; position: relative; }
        .milestone-badge {
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid var(--line-color); border-radius: 50%;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; z-index: 20;
        }
        .event.top .milestone-badge { top: 50%; }
        .event.bottom .milestone-badge { bottom: 50%; }

        .content-box { text-align: center; width: 100%; }
        .year { font-size: var(--year-size); font-weight: bold; margin: 0; outline: none; }
        .divider { width: 30px; height: 3px; background: var(--line-color); margin: 8px auto; }
        .description { font-size: var(--info-size); margin: 0; outline: none; line-height: 1.4; border-radius: 4px; padding: 4px; }

        #emoji-picker {
            display: none; position: absolute; background: white; border: 1px solid #ccc;
            padding: 10px; border-radius: 8px; z-index: 3000; grid-template-columns: repeat(4, 1fr); gap: 5px;
        }

        @media print { .main-controls, #header-editor, #emoji-picker { display: none !important; } }
    </style>
</head>
<body id="main-body">

    <div class="main-controls">
        <input type="text" id="yearIn" class="input-box" placeholder="Jahr (z.B. 500 v. Chr.)" style="width: 140px;">
        <input type="text" id="descIn" class="input-box" placeholder="Ereignis..." style="width: 200px;" onkeydown="if(event.key==='Enter') addEvent()">
        <button class="btn btn-add" onclick="addEvent()">Hinzufügen</button>
        <button class="btn" style="background:#f39c12; color:white" onclick="sortEvents()">Sortieren</button>
        <button class="btn btn-pres" onclick="togglePresentation()">Präsentation (P)</button>
        <button class="btn" style="background:#6c757d; color:white" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="header-editor">
        <input type="number" id="headSizeIn" value="40" style="width:50px" oninput="formatTitle('fontSize', this.value + 'px')">
        <button onclick="formatTitle('underline')"><u>U</u></button>
        <button onclick="formatTitle('justifyLeft')">⬅</button>
        <button onclick="formatTitle('justifyCenter')">Center</button>
        <button onclick="formatTitle('justifyRight')">➡</button>
    </div>

    <div id="settings-menu" style="display:none; background:white; padding:15px; border-radius:15px; margin-bottom:10px; gap:15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <label>Symbole: <input type="checkbox" id="allowIcons" checked onchange="render()"></label>
        <label>Linienfarbe: <input type="color" id="lineColorSet" value="#4472C4" oninput="applyStyle()"></label>
        <button class="btn" style="background:#28a745; color:white" onclick="downloadPDF()">Export PDF</button>
    </div>

    <div id="emoji-picker">
        <span onclick="setEmoji('')">❌</span>
        <span onclick="setEmoji('👑')">👑</span><span onclick="setEmoji('⚔️')">⚔️</span>
        <span onclick="setEmoji('💡')">💡</span><span onclick="setEmoji('📜')">📜</span>
    </div>

    <div id="preview-viewport">
        <div id="export-area">
            <h1 id="title-el" contenteditable="true" onfocus="showTitleEditor(event)">Mein Zeitstrahl</h1>
            <div class="timeline-wrapper"><div id="events-container" style="position:relative; width:100%; height:100%;"></div></div>
            <div id="footer-text" style="position:absolute; bottom:20px; right:40px; font-size:12px; color:#999;">erstellt mit https://jasonnewacc.github.io/zeitstrahl.github.io/main</div>
        </div>
    </div>

<script>
    let eventsData = [];
    let activeEventIdx = -1;
    let presIdx = -1;

    // TITEL EDITOR LOGIK
    function showTitleEditor(e) {
        const editor = document.getElementById('header-editor');
        const rect = e.target.getBoundingClientRect();
        editor.style.display = 'flex';
        editor.style.left = rect.left + 'px';
        editor.style.top = (rect.bottom + window.scrollY + 5) + 'px';
    }

    function formatTitle(cmd, val = null) {
        if(cmd === 'fontSize') {
            document.getElementById('title-el').style.fontSize = val;
        } else {
            document.execCommand(cmd, false, val);
        }
    }

    // PRÄSENTATIONS LOGIK
    function togglePresentation() {
        document.body.classList.toggle('pres-mode');
        presIdx = -1;
        document.querySelectorAll('.event').forEach(el => el.classList.remove('focus-event'));
    }

    document.addEventListener('keydown', (e) => {
        if(e.key.toLowerCase() === 'p') togglePresentation();
        if(!document.body.classList.contains('pres-mode')) return;

        if(e.key === 'ArrowRight') {
            presIdx = Math.min(presIdx + 1, eventsData.length - 1);
            updateFocus();
        }
        if(e.key === 'ArrowLeft') {
            presIdx = Math.max(presIdx - 1, 0);
            updateFocus();
        }
        if(e.key === 'Escape') togglePresentation();
    });

    function updateFocus() {
        document.querySelectorAll('.event').forEach(el => el.classList.remove('focus-event'));
        const target = document.querySelector(`#ev-dom-${presIdx}`);
        if(target) target.classList.add('focus-event');
    }

    // BASIS FUNKTIONEN
    function toggleSettings() {
        const s = document.getElementById('settings-menu');
        s.style.display = s.style.display === 'none' ? 'flex' : 'none';
    }

    function applyStyle() {
        document.documentElement.style.setProperty('--line-color', document.getElementById('lineColorSet').value);
        render();
    }

    function parseYear(val) {
        let str = val.toString().toLowerCase();
        let num = parseInt(str.replace(/[^0-9-]/g, ''));
        if (isNaN(num)) return 0;
        return (str.includes('v.') || str.includes('vor')) ? -Math.abs(num) : num;
    }

    function addEvent() {
        const y = document.getElementById('yearIn'), d = document.getElementById('descIn');
        if(!y.value || !d.value) return;
        eventsData.push({ id: Date.now(), year: y.value, desc: d.value, icon: '' });
        y.value=""; d.value=""; y.focus();
        render();
    }

    function sortEvents() {
        eventsData.sort((a, b) => parseYear(a.year) - parseYear(b.year));
        render();
    }

    function render() {
        const container = document.getElementById('events-container');
        container.innerHTML = "";
        const showIcons = document.getElementById('allowIcons').checked;

        eventsData.forEach((ev, i) => {
            const isTop = i % 2 === 0;
            const pos = eventsData.length > 1 ? 5 + (i / (eventsData.length - 1)) * 90 : 50;
            const div = document.createElement('div');
            div.className = `event ${isTop ? 'top' : 'bottom'}`;
            div.id = `ev-dom-${i}`;
            div.style.left = pos + "%";
            div.innerHTML = `
                <div class="content-box">
                    <div class="year" contenteditable="true" onblur="eventsData[${i}].year=this.innerText">${ev.year}</div>
                    <div class="divider"></div>
                    <div class="description" contenteditable="true" onblur="eventsData[${i}].desc=this.innerText">${ev.desc}</div>
                </div>
                <div class="connector" onclick="openEmojiPicker(event, ${i})" oncontextmenu="event.preventDefault(); eventsData.splice(${i},1); render();">
                    ${(showIcons && ev.icon) ? `<div class="milestone-badge">${ev.icon}</div>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openEmojiPicker(e, idx) {
        e.stopPropagation(); activeEventIdx = idx;
        const p = document.getElementById('emoji-picker');
        p.style.display = 'grid'; p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
    }

    function setEmoji(emoji) {
        if(activeEventIdx !== -1) { eventsData[activeEventIdx].icon = emoji; render(); }
        document.getElementById('emoji-picker').style.display = 'none';
    }

    function downloadPDF() {
        html2pdf().from(document.getElementById('export-area')).save('zeitstrahl.pdf');
    }

    // Klick außerhalb schließt Menüs
    document.addEventListener('mousedown', (e) => {
        if(!e.target.closest('#header-editor') && !e.target.closest('#title-el')) {
            document.getElementById('header-editor').style.display = 'none';
        }
        if(!e.target.closest('#emoji-picker')) {
            document.getElementById('emoji-picker').style.display = 'none';
        }
    });

    render();
</script>
</body>
</html>
