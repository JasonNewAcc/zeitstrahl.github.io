<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Zeitstrahl Pro - Alle Einstellungen</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --line-color: #4472C4; 
            --line-weight: 4px; 
            --year-size: 26px;
            --info-size: 16px;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #cbd2d9; margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Präsentationsmodus */
        body.pres-mode { background: #111; overflow: hidden; }
        body.pres-mode .main-controls, body.pres-mode #settings-menu, body.pres-mode #header-editor { display: none !important; }
        
        .focus-event { 
            outline: 4px solid gold !important; 
            transform: translateX(-50%) scale(1.2) !important; 
            z-index: 1000 !important; 
            background: white; border-radius: 10px; padding: 10px;
            box-shadow: 0 0 50px rgba(255,215,0,0.5);
        }

        .main-controls {
            background: white; padding: 12px 20px; border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex; gap: 10px; align-items: center;
            margin-bottom: 15px; position: sticky; top: 10px; z-index: 1000;
        }

        .input-box { padding: 8px 15px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .btn { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-add { background: #4472C4; color: white; }
        .btn-pres { background: #2c3e50; color: white; }

        /* Settings & Editor Panels */
        #settings-menu {
            display: none; background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2); margin-bottom: 15px;
            gap: 15px; flex-wrap: wrap; justify-content: center;
        }
        .setting-group { display: flex; flex-direction: column; gap: 4px; font-size: 10px; font-weight: bold; color: #444; text-transform: uppercase; }
        
        #header-editor {
            display: none; position: absolute; background: #222; color: white;
            padding: 10px; border-radius: 8px; gap: 10px; z-index: 2000;
        }

        /* Export Area */
        #export-area {
            background: white; padding: 60px 0; position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
            width: 1100px; height: 650px; box-sizing: border-box; overflow: hidden;
        }

        #title-el { font-size: 2.5em; margin-bottom: 30px; outline: none; text-align: center; }
        
        .main-timeline-line { 
            position: absolute; top: 55%; left: 80px; right: 100px; 
            height: var(--line-weight); background: var(--line-color); 
            z-index: 1;
        }
        .main-timeline-line::after {
            content: ''; position: absolute; right: -25px; top: 50%; transform: translateY(-50%);
            border-top: 15px solid transparent; border-bottom: 15px solid transparent;
            border-left: 25px solid var(--line-color);
        }

        /* Event Styling & PDF Fix */
        .event { 
            position: absolute; width: 220px; transform: translateX(-50%); 
            display: flex; align-items: center; z-index: 10; transition: transform 0.3s;
        }
        .event.top { bottom: 45%; flex-direction: column; padding-bottom: 2px; }
        .event.bottom { top: 55%; flex-direction: column-reverse; padding-top: 2px; }

        .connector { width: 2px; height: 60px; background: var(--line-color); cursor: pointer; position: relative; }
        
        .milestone-badge {
            position: absolute; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 2px solid var(--line-color); border-radius: 50%;
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .content-box { text-align: center; width: 100%; }
        .year { font-size: var(--year-size); font-weight: bold; margin: 0; outline: none; }
        .divider { width: 30px; height: 3px; background: var(--line-color); margin: 8px auto; }
        .description { font-size: var(--info-size); margin: 0; outline: none; line-height: 1.4; padding: 4px; }
        .limit-exceeded { background: #fff1f1; border: 1px solid red; border-radius: 4px; }

        #emoji-picker {
            display: none; position: absolute; background: white; border: 1px solid #ccc;
            padding: 10px; border-radius: 8px; z-index: 3000; grid-template-columns: repeat(4, 1fr); gap: 5px;
        }
        .emoji-btn { cursor: pointer; font-size: 20px; padding: 5px; }

        #footer-text { position: absolute; bottom: 20px; right: 40px; font-size: 12px; color: #999; }
    </style>
</head>
<body>

    <div class="main-controls">
        <input type="text" id="yearIn" class="input-box" placeholder="Jahr" style="width: 100px;">
        <input type="text" id="descIn" class="input-box" placeholder="Ereignis..." style="width: 220px;" onkeydown="if(event.key==='Enter') addEvent()">
        <button class="btn btn-add" onclick="addEvent()">+</button>
        <button class="btn" style="background:#f39c12; color:white" onclick="sortEvents()">Sortieren</button>
        <button class="btn btn-pres" onclick="togglePresentation()">Präsentation (P)</button>
        <button class="btn" onclick="toggleSettings()">⚙️</button>
    </div>

    <div id="settings-menu">
        <div class="setting-group"><label>Icons</label><input type="checkbox" id="allowIcons" checked onchange="render()"></div>
        <div class="setting-group"><label>Größe BxH</label><div style="display:flex;gap:4px;"><input type="number" id="wSet" value="1100" style="width:60px;" oninput="applyAllSettings()"><input type="number" id="hSet" value="650" style="width:60px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Schrift J/I</label><div style="display:flex;gap:4px;"><input type="number" id="yearSizeSet" value="26" style="width:45px;" oninput="applyAllSettings()"><input type="number" id="infoSizeSet" value="16" style="width:45px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Linie Farbe/Dicke</label><div style="display:flex;gap:4px;"><input type="color" id="lineColorSet" value="#4472C4" oninput="applyAllSettings()"><input type="number" id="lineWeightSet" value="4" style="width:35px;" oninput="applyAllSettings()"></div></div>
        <div class="setting-group"><label>Textlimit</label><input type="number" id="limitSet" value="120" style="width:50px;" oninput="applyAllSettings()"></div>
        <button class="btn" style="background:#28a745; color:white" onclick="downloadPDF()">Export PDF</button>
    </div>

    <div id="header-editor">
        <button onclick="formatTitle('underline')">U</button>
        <button onclick="formatTitle('justifyCenter')">Center</button>
    </div>

    <div id="emoji-picker">
        <span class="emoji-btn" onclick="setEmoji('')">❌</span>
        <span class="emoji-btn" onclick="setEmoji('👑')">👑</span><span class="emoji-btn" onclick="setEmoji('⚔️')">⚔️</span>
        <span class="emoji-btn" onclick="setEmoji('💡')">💡</span><span class="emoji-btn" onclick="setEmoji('📜')">📜</span>
    </div>

    <div id="export-area">
        <h1 id="title-el" contenteditable="true" onfocus="showTitleEditor(event)">Mein Zeitstrahl</h1>
        <div class="main-timeline-line"></div>
        <div id="events-container"></div>
        <div id="footer-text">erstellt mit jasonnewacc.github.io/zeitstrahl</div>
    </div>

<script>
    let eventsData = [];
    let activeEventIdx = -1;
    let presIdx = -1;

    function toggleSettings() {
        const s = document.getElementById('settings-menu');
        s.style.display = s.style.display === 'flex' ? 'none' : 'flex';
    }

    function showTitleEditor(e) {
        const editor = document.getElementById('header-editor');
        const rect = e.target.getBoundingClientRect();
        editor.style.display = 'flex';
        editor.style.left = rect.left + 'px';
        editor.style.top = (rect.bottom + window.scrollY + 5) + 'px';
    }

    function formatTitle(cmd) { document.execCommand(cmd, false, null); }

    function applyAllSettings() {
        const area = document.getElementById('export-area');
        area.style.width = document.getElementById('wSet').value + "px";
        area.style.height = document.getElementById('hSet').value + "px";
        document.documentElement.style.setProperty('--year-size', document.getElementById('yearSizeSet').value + "px");
        document.documentElement.style.setProperty('--info-size', document.getElementById('infoSizeSet').value + "px");
        document.documentElement.style.setProperty('--line-color', document.getElementById('lineColorSet').value);
        document.documentElement.style.setProperty('--line-weight', document.getElementById('lineWeightSet').value + "px");
        render();
    }

    function addEvent() {
        const y = document.getElementById('yearIn'), d = document.getElementById('descIn');
        if(!y.value || !d.value) return;
        eventsData.push({ year: y.value, desc: d.value, icon: '' });
        y.value=""; d.value="";
        render();
    }

    function sortEvents() {
        eventsData.sort((a, b) => parseInt(a.year.replace(/\D/g,'')) - parseInt(b.year.replace(/\D/g,'')));
        render();
    }

    function render() {
        const container = document.getElementById('events-container');
        container.innerHTML = "";
        const width = parseInt(document.getElementById('wSet').value);
        const limit = parseInt(document.getElementById('limitSet').value);

        // PUFFER: Damit die Striche nach rechts/links rücken
        const paddingSide = 150; 
        const availableWidth = width - (paddingSide * 2);

        eventsData.forEach((ev, i) => {
            const isTop = i % 2 === 0;
            const xPos = eventsData.length > 1 ? paddingSide + (i / (eventsData.length - 1)) * availableWidth : width/2;
            
            const div = document.createElement('div');
            div.className = `event ${isTop ? 'top' : 'bottom'}`;
            div.id = `ev-dom-${i}`;
            div.style.left = xPos + "px";
            
            div.innerHTML = `
                <div class="content-box">
                    <div class="year" contenteditable="true" onblur="eventsData[${i}].year=this.innerText">${ev.year}</div>
                    <div class="divider"></div>
                    <div class="description ${ev.desc.length > limit ? 'limit-exceeded' : ''}" contenteditable="true" onblur="eventsData[${i}].desc=this.innerText">${ev.desc}</div>
                </div>
                <div class="connector" onclick="openEmojiPicker(event, ${i})" oncontextmenu="event.preventDefault(); eventsData.splice(${i},1); render();">
                    ${(document.getElementById('allowIcons').checked && ev.icon) ? `<div class="milestone-badge">${ev.icon}</div>` : ''}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function openEmojiPicker(e, idx) {
        e.stopPropagation(); activeEventIdx = idx;
        const p = document.getElementById('emoji-picker');
        p.style.display = 'grid'; p.style.left = e.pageX + 'px'; p.style.top = e.pageY + 'px';
    }

    function setEmoji(emoji) {
        if(activeEventIdx !== -1) { eventsData[activeEventIdx].icon = emoji; render(); }
        document.getElementById('emoji-picker').style.display = 'none';
    }

    function togglePresentation() {
        document.body.classList.toggle('pres-mode');
        presIdx = -1;
    }

    document.addEventListener('keydown', (e) => {
        if(!document.body.classList.contains('pres-mode')) return;
        if(e.key === 'ArrowRight') { presIdx = Math.min(presIdx + 1, eventsData.length - 1); updateFocus(); }
        if(e.key === 'ArrowLeft') { presIdx = Math.max(presIdx - 1, 0); updateFocus(); }
    });

    function updateFocus() {
        document.querySelectorAll('.event').forEach(el => el.classList.remove('focus-event'));
        document.getElementById(`ev-dom-${presIdx}`).classList.add('focus-event');
    }

    function downloadPDF() {
        const area = document.getElementById('export-area');
        const w = parseInt(document.getElementById('wSet').value);
        const h = parseInt(document.getElementById('hSet').value);
        html2pdf().set({
            margin: 0, filename: 'zeitstrahl.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'px', format: [w, h], orientation: 'landscape' }
        }).from(area).save();
    }

    applyAllSettings();
</script>
</body>
</html>
